version: 1.3.6

cache: true

interface:
  customWelcome: "LibreChat connected to a local PostgreSQL MCP server."
  fileSearch: true
  endpointsMenu: true
  modelSelect: true
  parameters: true
  sidePanel: true
  presets: true
  prompts:
    use: true
    create: true
    share: false
    public: false
  bookmarks: true
  multiConvo: true
  agents:
    use: true
    create: true
    share: false
    public: false
  mcpServers:
    use: true
    create: false
    share: false
    public: false

mcpSettings:
  allowedDomains:
    - "http://pgmcp:8080"

mcpServers:
  postgres:
    type: streamable-http
    url: "http://pgmcp:8080/mcp"
    timeout: 30000


endpoints:
  bedrock:
    availableRegions:
      - "us-west-2"
    titleModel: "current_model"
    inferenceProfiles:
      "anthropic.claude-3-7-sonnet-20250219-v1:0": "us.anthropic.claude-3-7-sonnet-20250219-v1:0"
      "anthropic.claude-opus-4-20250514-v1:0": "us.anthropic.claude-opus-4-20250514-v1:0"
      "anthropic.claude-sonnet-4-20250514-v1:0": "us.anthropic.claude-sonnet-4-20250514-v1:0"
      "anthropic.claude-opus-4-1-20250805-v1:0": "us.anthropic.claude-opus-4-1-20250805-v1:0"
      "anthropic.claude-sonnet-4-5-20250929-v1:0": "us.anthropic.claude-sonnet-4-5-20250929-v1:0"
      "anthropic.claude-haiku-4-5-20251001-v1:0": "us.anthropic.claude-haiku-4-5-20251001-v1:0"
      "anthropic.claude-opus-4-5-20251101-v1:0": "us.anthropic.claude-opus-4-5-20251101-v1:0"
      "anthropic.claude-sonnet-4-6": "us.anthropic.claude-sonnet-4-6"
      "anthropic.claude-opus-4-6-v1": "us.anthropic.claude-opus-4-6-v1"
  custom:
    - name: "LMStudio"
      apiKey: "lmstudio"
      baseURL: "http://host.docker.internal:1234/v1/"
      models:
        default:
          - "openai/gpt-oss-20b"
        fetch: false
      titleConvo: true
      titleModel: "openai/gpt-oss-20b"
      summarize: false
      modelDisplayLabel: "LM Studio"
